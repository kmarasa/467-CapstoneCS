name : Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v3
        with:
          submodules:  recursive
      - name: Install dependencies background: 
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi
      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make 
